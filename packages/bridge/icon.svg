<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    @takumi/bridge — The Bridge
    Pixel-art wooden rope bridge spanning a misty forest ravine.
    Bridge connects Takumi to Chitragupta — the crossing between worlds.
  -->
  <defs>
    <linearGradient id="brMist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d2b3d"/>
      <stop offset="60%" stop-color="#3b3426"/>
      <stop offset="100%" stop-color="#1e1b16"/>
    </linearGradient>
  </defs>

  <!-- Background — misty forest twilight -->
  <rect width="128" height="128" rx="16" fill="url(#brMist)"/>

  <!-- Mist layers -->
  <g fill="#e8dcc8" opacity="0.06">
    <rect x="0" y="56" width="128" height="6" rx="3"/>
    <rect x="8" y="64" width="112" height="4" rx="2"/>
    <rect x="16" y="72" width="96" height="3" rx="1"/>
  </g>

  <!-- Left cliff / bank -->
  <g fill="#4a443a">
    <rect x="0" y="48" width="28" height="80"/>
    <rect x="28" y="56" width="8" height="72"/>
    <rect x="0" y="44" width="24" height="6"/>
    <rect x="0" y="40" width="16" height="6"/>
  </g>
  <!-- Right cliff / bank -->
  <g fill="#4a443a">
    <rect x="100" y="48" width="28" height="80"/>
    <rect x="92" y="56" width="8" height="72"/>
    <rect x="104" y="44" width="24" height="6"/>
    <rect x="112" y="40" width="16" height="6"/>
  </g>

  <!-- Cliff edge moss -->
  <g fill="#6b8e4e">
    <rect x="22" y="44" width="8" height="3" rx="1" opacity="0.6"/>
    <rect x="26" y="48" width="6" height="3" rx="1" opacity="0.5"/>
    <rect x="98" y="44" width="8" height="3" rx="1" opacity="0.6"/>
    <rect x="94" y="48" width="6" height="3" rx="1" opacity="0.5"/>
  </g>

  <!-- Cliff face texture -->
  <g fill="#3d3830" opacity="0.4">
    <rect x="8" y="60" width="4" height="2"/>
    <rect x="16" y="72" width="4" height="2"/>
    <rect x="110" y="64" width="4" height="2"/>
    <rect x="104" y="76" width="4" height="2"/>
  </g>

  <!-- Ravine / abyss (darker gap) -->
  <rect x="28" y="80" width="72" height="48" fill="#0e0d08"/>

  <!-- Bridge rope top (left to right, slight sag) -->
  <g fill="#8a7a5e">
    <!-- Top rope -->
    <rect x="28" y="48" width="4" height="2"/>
    <rect x="32" y="49" width="8" height="2"/>
    <rect x="40" y="50" width="8" height="2"/>
    <rect x="48" y="51" width="8" height="2"/>
    <rect x="56" y="52" width="8" height="2"/>
    <rect x="64" y="52" width="8" height="2"/>
    <rect x="72" y="51" width="8" height="2"/>
    <rect x="80" y="50" width="8" height="2"/>
    <rect x="88" y="49" width="8" height="2"/>
    <rect x="96" y="48" width="4" height="2"/>
    <!-- Bottom rope -->
    <rect x="28" y="66" width="4" height="2"/>
    <rect x="32" y="68" width="8" height="2"/>
    <rect x="40" y="70" width="8" height="2"/>
    <rect x="48" y="71" width="8" height="2"/>
    <rect x="56" y="72" width="8" height="2"/>
    <rect x="64" y="72" width="8" height="2"/>
    <rect x="72" y="71" width="8" height="2"/>
    <rect x="80" y="70" width="8" height="2"/>
    <rect x="88" y="68" width="8" height="2"/>
    <rect x="96" y="66" width="4" height="2"/>
  </g>

  <!-- Bridge planks (wooden slats) -->
  <g fill="#6b5a3e">
    <rect x="32" y="54" width="3" height="16" rx="0.5"/>
    <rect x="38" y="55" width="3" height="17" rx="0.5"/>
    <rect x="44" y="56" width="3" height="17" rx="0.5"/>
    <rect x="50" y="57" width="3" height="17" rx="0.5"/>
    <rect x="56" y="58" width="3" height="16" rx="0.5"/>
    <rect x="62" y="58" width="3" height="16" rx="0.5"/>
    <rect x="68" y="57" width="3" height="17" rx="0.5"/>
    <rect x="74" y="56" width="3" height="17" rx="0.5"/>
    <rect x="80" y="55" width="3" height="17" rx="0.5"/>
    <rect x="86" y="54" width="3" height="16" rx="0.5"/>
    <rect x="92" y="53" width="3" height="15" rx="0.5"/>
  </g>
  <!-- Plank wood grain highlights -->
  <g fill="#7a6a4e" opacity="0.5">
    <rect x="33" y="56" width="1" height="6"/>
    <rect x="45" y="58" width="1" height="6"/>
    <rect x="63" y="60" width="1" height="6"/>
    <rect x="81" y="57" width="1" height="6"/>
    <rect x="93" y="55" width="1" height="6"/>
  </g>

  <!-- Rope vertical supports (connecting top/bottom ropes to planks) -->
  <g fill="#8a7a5e" opacity="0.6">
    <rect x="34" y="51" width="1" height="4"/>
    <rect x="34" y="70" width="1" height="3"/>
    <rect x="46" y="52" width="1" height="4"/>
    <rect x="46" y="72" width="1" height="3"/>
    <rect x="58" y="54" width="1" height="5"/>
    <rect x="58" y="73" width="1" height="3"/>
    <rect x="70" y="53" width="1" height="5"/>
    <rect x="70" y="72" width="1" height="3"/>
    <rect x="82" y="52" width="1" height="4"/>
    <rect x="82" y="71" width="1" height="3"/>
  </g>

  <!-- Trees behind cliffs -->
  <g fill="#1e1b16">
    <!-- Left trees -->
    <rect x="6" y="32" width="4" height="4"/>
    <rect x="4" y="36" width="8" height="3"/>
    <rect x="2" y="39" width="12" height="3"/>
    <rect x="7" y="42" width="3" height="6"/>
    <rect x="18" y="34" width="4" height="4"/>
    <rect x="16" y="38" width="8" height="3"/>
    <rect x="19" y="41" width="3" height="5"/>
    <!-- Right trees -->
    <rect x="110" y="30" width="4" height="4"/>
    <rect x="108" y="34" width="8" height="3"/>
    <rect x="106" y="37" width="12" height="3"/>
    <rect x="111" y="40" width="3" height="6"/>
    <rect x="120" y="34" width="4" height="4"/>
    <rect x="118" y="38" width="8" height="3"/>
    <rect x="121" y="41" width="3" height="5"/>
  </g>

  <!-- Leaf falling -->
  <rect x="54" y="38" width="3" height="2" rx="0.5" fill="#8fa65e" opacity="0.4">
    <animate attributeName="y" values="38;82;38" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x" values="54;60;54" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.15;0.4" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Firefly in the mist -->
  <circle cx="64" cy="78" r="2" fill="#e8d46e" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.05;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Stars above -->
  <rect x="48" y="10" width="2" height="2" fill="#f9e2af" opacity="0.4"/>
  <rect x="80" y="14" width="2" height="2" fill="#f9e2af" opacity="0.3"/>

  <!-- Label -->
  <text x="64" y="118" text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="10" font-weight="600" fill="#cdd6f4" opacity="0.7" letter-spacing="1"
  >bridge</text>
</svg>

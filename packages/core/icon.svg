<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    @takumi/core — The Seed
    A pixel-art acorn/seed crystal embedded in earth. Core is the foundation:
    config, types, constants, sessions — the seed everything grows from.
  -->
  <defs>
    <linearGradient id="cSoil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d3830"/>
      <stop offset="100%" stop-color="#2a2416"/>
    </linearGradient>
  </defs>

  <!-- Background — deep earth -->
  <rect width="128" height="128" rx="16" fill="#1e1b16"/>

  <!-- Soil layers at bottom -->
  <rect x="0" y="88" width="128" height="40" rx="0" fill="url(#cSoil)"/>
  <rect x="0" y="84" width="128" height="6" fill="#4a443a" opacity="0.5"/>
  <!-- Soil grain pixels -->
  <rect x="20" y="96" width="2" height="2" fill="#5c5549" opacity="0.4"/>
  <rect x="52" y="102" width="2" height="2" fill="#5c5549" opacity="0.3"/>
  <rect x="88" y="98" width="2" height="2" fill="#5c5549" opacity="0.4"/>
  <rect x="104" y="108" width="2" height="2" fill="#5c5549" opacity="0.3"/>

  <!-- Root tendrils growing down from seed -->
  <g fill="#6b8e4e" opacity="0.5">
    <rect x="62" y="76" width="3" height="10"/>
    <rect x="58" y="82" width="3" height="8"/>
    <rect x="66" y="80" width="3" height="10"/>
    <rect x="54" y="88" width="2" height="6"/>
    <rect x="70" y="86" width="2" height="8"/>
  </g>

  <!-- Acorn / seed body -->
  <!-- Cap (darker, textured) -->
  <g fill="#6b5a3e">
    <rect x="44" y="32" width="40" height="6"/>
    <rect x="40" y="38" width="48" height="4"/>
    <rect x="42" y="42" width="44" height="4"/>
  </g>
  <!-- Cap crosshatch texture -->
  <rect x="48" y="34" width="2" height="2" fill="#5a4a32" opacity="0.6"/>
  <rect x="56" y="36" width="2" height="2" fill="#5a4a32" opacity="0.6"/>
  <rect x="64" y="34" width="2" height="2" fill="#5a4a32" opacity="0.6"/>
  <rect x="72" y="36" width="2" height="2" fill="#5a4a32" opacity="0.6"/>
  <!-- Cap stem -->
  <rect x="62" y="26" width="4" height="8" fill="#5a4a32"/>
  <rect x="60" y="24" width="3" height="4" fill="#5e7a3e" opacity="0.6"/>

  <!-- Seed body (warm amber — like the kanji color) -->
  <g fill="#d4a56a">
    <rect x="42" y="46" width="44" height="4"/>
    <rect x="44" y="50" width="40" height="4"/>
    <rect x="46" y="54" width="36" height="4"/>
    <rect x="48" y="58" width="32" height="4"/>
    <rect x="50" y="62" width="28" height="4"/>
    <rect x="52" y="66" width="24" height="4"/>
    <rect x="56" y="70" width="16" height="4"/>
    <rect x="60" y="74" width="8" height="3"/>
  </g>
  <!-- Seed highlight -->
  <rect x="50" y="48" width="4" height="8" fill="#e0c88a" opacity="0.5"/>
  <!-- Seed shadow -->
  <rect x="72" y="52" width="4" height="12" fill="#b8924e" opacity="0.4"/>

  <!-- Tiny sprout emerging from top -->
  <rect x="63" y="18" width="3" height="8" fill="#6b8e4e"/>
  <rect x="59" y="14" width="3" height="6" fill="#8fa65e"/>
  <rect x="67" y="12" width="3" height="6" fill="#8fa65e"/>
  <rect x="56" y="12" width="3" height="3" fill="#a3b86c" opacity="0.6"/>
  <rect x="70" y="10" width="3" height="3" fill="#a3b86c" opacity="0.6"/>

  <!-- Tiny firefly -->
  <circle cx="24" cy="36" r="2" fill="#e8d46e" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Label -->
  <text x="64" y="120" text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="10" font-weight="600" fill="#cdd6f4" opacity="0.7" letter-spacing="1"
  >core</text>
</svg>

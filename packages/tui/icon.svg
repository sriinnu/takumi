<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    @takumi/tui — The Lantern
    Pixel-art paper lantern hanging from a tree branch in a forest clearing.
    TUI is the warm interface the user sees — light in the terminal darkness.
  -->
  <defs>
    <linearGradient id="tSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#2d2b3d"/>
    </linearGradient>
    <radialGradient id="tLight" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#f9e2af" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#e0a85e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2d2b3d" stop-opacity="0"/>
    </radialGradient>
    <filter id="tGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect width="128" height="128" rx="16" fill="url(#tSky)"/>

  <!-- Lantern warm glow aura -->
  <rect width="128" height="128" rx="16" fill="url(#tLight)"/>

  <!-- Stars -->
  <g fill="#f9e2af">
    <rect x="8" y="8" width="2" height="2" opacity="0.4"/>
    <rect x="108" y="12" width="2" height="2" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="24" y="16" width="2" height="2" opacity="0.35"/>
    <rect x="96" y="6" width="2" height="2" opacity="0.4"/>
  </g>

  <!-- Tree canopy at top (branch the lantern hangs from) -->
  <g fill="#2a2416">
    <!-- Main branch coming from left -->
    <rect x="0" y="16" width="68" height="5"/>
    <rect x="0" y="12" width="30" height="5"/>
    <rect x="0" y="8" width="14" height="5"/>
    <!-- Branch thins toward center -->
    <rect x="54" y="14" width="20" height="3"/>
  </g>
  <!-- Branch texture -->
  <rect x="8" y="17" width="4" height="2" fill="#3d3830" opacity="0.5"/>
  <rect x="28" y="17" width="4" height="2" fill="#3d3830" opacity="0.4"/>
  <rect x="48" y="15" width="4" height="2" fill="#3d3830" opacity="0.4"/>

  <!-- Leaves on branch -->
  <g fill="#5e7a3e">
    <rect x="16" y="10" width="4" height="3" rx="1" opacity="0.6"/>
    <rect x="34" y="12" width="4" height="3" rx="1" opacity="0.5"/>
    <rect x="44" y="10" width="3" height="4" rx="1" opacity="0.5"/>
    <rect x="60" y="12" width="3" height="3" rx="1" opacity="0.4"/>
    <!-- Hanging leaf -->
    <rect x="26" y="21" width="2" height="4" rx="0.5" opacity="0.4"/>
    <rect x="50" y="19" width="2" height="3" rx="0.5" opacity="0.3"/>
  </g>

  <!-- Hanging string from branch to lantern -->
  <rect x="63" y="18" width="2" height="14" fill="#8a7a5e"/>

  <!-- ===== LANTERN ===== -->
  <g transform="translate(40, 32)">
    <!-- Top cap -->
    <g fill="#6b5a3e">
      <rect x="18" y="0" width="12" height="3" rx="1"/>
      <rect x="14" y="3" width="20" height="3"/>
    </g>

    <!-- Paper body (warm glowing center) -->
    <g fill="#d4a56a" filter="url(#tGlow)">
      <rect x="12" y="6" width="24" height="4"/>
      <rect x="8" y="10" width="32" height="4"/>
      <rect x="6" y="14" width="36" height="4"/>
      <rect x="4" y="18" width="40" height="4"/>
      <rect x="4" y="22" width="40" height="4"/>
      <rect x="4" y="26" width="40" height="4"/>
      <rect x="6" y="30" width="36" height="4"/>
      <rect x="8" y="34" width="32" height="4"/>
      <rect x="12" y="38" width="24" height="4"/>
    </g>

    <!-- Inner glow (brighter center) -->
    <g fill="#f9e2af" opacity="0.4">
      <rect x="14" y="16" width="20" height="4"/>
      <rect x="12" y="20" width="24" height="4"/>
      <rect x="12" y="24" width="24" height="4"/>
      <rect x="14" y="28" width="20" height="4"/>
    </g>

    <!-- Warm hotspot -->
    <rect x="18" y="20" width="12" height="8" fill="#f9e2af" opacity="0.25"/>

    <!-- Kanji 匠 shadow inside the lantern (very subtle) -->
    <text x="24" y="28" text-anchor="middle" dominant-baseline="central"
      font-family="'Noto Sans JP',sans-serif" font-size="16" font-weight="700"
      fill="#3d3830" opacity="0.2"
    >匠</text>

    <!-- Lantern ribs (vertical bamboo strips) -->
    <g fill="#b8924e" opacity="0.4">
      <rect x="16" y="8" width="1" height="34"/>
      <rect x="24" y="6" width="1" height="36"/>
      <rect x="32" y="8" width="1" height="34"/>
    </g>

    <!-- Bottom cap -->
    <g fill="#6b5a3e">
      <rect x="14" y="42" width="20" height="3"/>
      <rect x="18" y="45" width="12" height="3" rx="1"/>
    </g>

    <!-- Tassel hanging from bottom -->
    <rect x="22" y="48" width="4" height="6" fill="#8a7a5e"/>
    <rect x="20" y="54" width="3" height="4" fill="#d4a56a" opacity="0.5"/>
    <rect x="25" y="54" width="3" height="4" fill="#d4a56a" opacity="0.5"/>
    <rect x="21" y="56" width="2" height="4" fill="#d4a56a" opacity="0.3"/>
    <rect x="26" y="56" width="2" height="4" fill="#d4a56a" opacity="0.3"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="104" width="128" height="24" fill="#2a2416"/>
  <rect x="0" y="102" width="128" height="4" fill="#3d3830" opacity="0.5"/>

  <!-- Ground grass -->
  <g fill="#5e7a3e">
    <rect x="12" y="100" width="3" height="4"/>
    <rect x="16" y="98" width="3" height="6"/>
    <rect x="36" y="100" width="3" height="4"/>
    <rect x="80" y="98" width="3" height="6"/>
    <rect x="84" y="100" width="3" height="4"/>
    <rect x="104" y="100" width="3" height="4"/>
    <rect x="108" y="98" width="3" height="6"/>
  </g>

  <!-- Light pool on ground (lantern light hitting earth) -->
  <ellipse cx="64" cy="104" rx="28" ry="4" fill="#d4a56a" opacity="0.08"/>

  <!-- Fireflies drawn to lantern light -->
  <circle cx="28" cy="56" r="1.5" fill="#e8d46e" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.06;0.4" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="28;32;28" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="102" cy="62" r="1.5" fill="#e8d46e" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.05;0.35" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Label -->
  <text x="64" y="120" text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="10" font-weight="600" fill="#cdd6f4" opacity="0.7" letter-spacing="1"
  >tui</text>
</svg>

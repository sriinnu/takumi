<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    @takumi/render — The Aurora
    Pixel-art northern lights / aurora over a mountain ridge.
    Render paints pixels on screen — this is the light-painting package.
  -->
  <defs>
    <linearGradient id="rSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#2d2b3d"/>
    </linearGradient>
  </defs>

  <!-- Night sky -->
  <rect width="128" height="128" rx="16" fill="url(#rSky)"/>

  <!-- Stars -->
  <g fill="#f9e2af">
    <rect x="16" y="12" width="2" height="2" opacity="0.6"/>
    <rect x="44" y="8" width="2" height="2" opacity="0.4"/>
    <rect x="96" y="14" width="2" height="2" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="72" y="6" width="2" height="2" opacity="0.35"/>
    <rect x="112" y="22" width="2" height="2" opacity="0.45"/>
  </g>

  <!-- Aurora bands — layered translucent pixel ribbons -->
  <!-- Band 1 (green — primary aurora color) -->
  <g fill="#8fa65e" opacity="0.35">
    <rect x="20" y="24" width="8" height="4"/>
    <rect x="28" y="20" width="12" height="4"/>
    <rect x="40" y="18" width="16" height="4"/>
    <rect x="56" y="20" width="12" height="4"/>
    <rect x="68" y="24" width="16" height="4"/>
    <rect x="84" y="22" width="12" height="4"/>
    <rect x="96" y="26" width="14" height="4"/>
  </g>
  <!-- Band 1 vertical curtain drips -->
  <g fill="#8fa65e" opacity="0.2">
    <rect x="32" y="24" width="4" height="12"/>
    <rect x="48" y="22" width="4" height="16"/>
    <rect x="72" y="28" width="4" height="10"/>
    <rect x="92" y="26" width="4" height="14"/>
  </g>

  <!-- Band 2 (teal/cyan accent) -->
  <g fill="#7ec8a4" opacity="0.25">
    <rect x="16" y="32" width="10" height="4"/>
    <rect x="26" y="28" width="14" height="4"/>
    <rect x="40" y="26" width="8" height="4"/>
    <rect x="56" y="28" width="20" height="4"/>
    <rect x="76" y="32" width="12" height="4"/>
    <rect x="88" y="30" width="16" height="4"/>
    <rect x="104" y="34" width="8" height="4"/>
  </g>
  <!-- Band 2 drips -->
  <g fill="#7ec8a4" opacity="0.15">
    <rect x="36" y="32" width="4" height="18"/>
    <rect x="64" y="32" width="4" height="14"/>
    <rect x="100" y="34" width="4" height="12"/>
  </g>

  <!-- Band 3 (purple/mauve — higher atmosphere) -->
  <g fill="#a68fc8" opacity="0.2">
    <rect x="24" y="16" width="8" height="4"/>
    <rect x="48" y="14" width="12" height="4"/>
    <rect x="80" y="16" width="10" height="4"/>
    <rect x="100" y="20" width="8" height="4"/>
  </g>

  <!-- Mountain ridge silhouette -->
  <g fill="#2a2416">
    <!-- Left mountain -->
    <rect x="0" y="80" width="128" height="48"/>
    <rect x="4" y="76" width="8" height="4"/>
    <rect x="12" y="72" width="8" height="8"/>
    <rect x="20" y="64" width="8" height="16"/>
    <rect x="28" y="60" width="8" height="20"/>
    <rect x="36" y="56" width="8" height="24"/>
    <rect x="44" y="60" width="8" height="20"/>
    <rect x="52" y="68" width="8" height="12"/>
    <!-- Right mountain -->
    <rect x="56" y="72" width="8" height="8"/>
    <rect x="64" y="68" width="8" height="12"/>
    <rect x="72" y="60" width="8" height="20"/>
    <rect x="80" y="52" width="8" height="28"/>
    <rect x="88" y="56" width="8" height="24"/>
    <rect x="96" y="64" width="8" height="16"/>
    <rect x="104" y="70" width="8" height="10"/>
    <rect x="112" y="74" width="8" height="6"/>
    <rect x="120" y="76" width="8" height="4"/>
  </g>

  <!-- Snow caps (pixel highlights on peaks) -->
  <g fill="#e8dcc8" opacity="0.5">
    <rect x="34" y="56" width="4" height="2"/>
    <rect x="38" y="56" width="4" height="2"/>
    <rect x="78" y="52" width="4" height="2"/>
    <rect x="82" y="52" width="4" height="2"/>
  </g>

  <!-- Pine tree silhouettes on slopes -->
  <g fill="#1e1b16">
    <rect x="14" y="72" width="4" height="4"/>
    <rect x="12" y="76" width="8" height="2"/>
    <rect x="50" y="68" width="4" height="4"/>
    <rect x="48" y="72" width="8" height="2"/>
    <rect x="60" y="70" width="4" height="4"/>
    <rect x="58" y="74" width="8" height="2"/>
    <rect x="108" y="68" width="4" height="4"/>
    <rect x="106" y="72" width="8" height="2"/>
  </g>

  <!-- Aurora reflection on ground (very subtle) -->
  <rect x="20" y="82" width="88" height="2" fill="#8fa65e" opacity="0.06"/>

  <!-- Label -->
  <text x="64" y="118" text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="10" font-weight="600" fill="#cdd6f4" opacity="0.7" letter-spacing="1"
  >render</text>
</svg>

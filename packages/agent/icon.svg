<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!--
    @takumi/agent — The Owl
    Pixel-art wise owl perched on a branch under moonlight.
    The agent is the intelligence — watchful, deliberate, sees in the dark.
  -->
  <defs>
    <linearGradient id="aSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#2d2b3d"/>
    </linearGradient>
    <filter id="aGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect width="128" height="128" rx="16" fill="url(#aSky)"/>

  <!-- Moon -->
  <g fill="#e8dcc8">
    <rect x="92" y="10" width="4" height="16" rx="1"/>
    <rect x="96" y="8" width="4" height="20" rx="1"/>
    <rect x="100" y="10" width="4" height="16" rx="1"/>
    <!-- Crescent cutout -->
    <rect x="96" y="10" width="4" height="16" fill="#1a1b2e"/>
  </g>

  <!-- Stars -->
  <g fill="#f9e2af">
    <rect x="20" y="12" width="2" height="2" opacity="0.5"/>
    <rect x="48" y="8" width="2" height="2" opacity="0.4"/>
    <rect x="76" y="16" width="2" height="2" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.08;0.45" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="112" y="28" width="2" height="2" opacity="0.35"/>
    <rect x="32" y="24" width="2" height="2" opacity="0.3"/>
  </g>

  <!-- Branch the owl sits on -->
  <g fill="#5a4a32">
    <rect x="0" y="84" width="128" height="6"/>
    <rect x="0" y="82" width="80" height="3"/>
    <rect x="92" y="82" width="36" height="3"/>
    <!-- Branch bump / knot -->
    <rect x="36" y="80" width="6" height="4" rx="1"/>
    <rect x="100" y="80" width="4" height="4" rx="1"/>
  </g>
  <!-- Branch bark texture -->
  <g fill="#4a3e28" opacity="0.5">
    <rect x="16" y="85" width="4" height="2"/>
    <rect x="48" y="86" width="4" height="2"/>
    <rect x="76" y="85" width="4" height="2"/>
    <rect x="108" y="86" width="4" height="2"/>
  </g>
  <!-- Moss on branch -->
  <rect x="20" y="82" width="8" height="2" rx="1" fill="#6b8e4e" opacity="0.4"/>
  <rect x="68" y="82" width="6" height="2" rx="1" fill="#6b8e4e" opacity="0.3"/>

  <!-- ===== OWL ===== -->
  <g transform="translate(38, 28)">
    <!-- Body (plump, warm brown) -->
    <g fill="#6b5a3e">
      <rect x="8" y="28" width="36" height="4"/>
      <rect x="4" y="32" width="44" height="4"/>
      <rect x="4" y="36" width="44" height="4"/>
      <rect x="4" y="40" width="44" height="4"/>
      <rect x="8" y="44" width="36" height="4"/>
      <rect x="12" y="48" width="28" height="4"/>
    </g>
    <!-- Belly (lighter, cream) -->
    <g fill="#c8b898">
      <rect x="16" y="36" width="20" height="4"/>
      <rect x="16" y="40" width="20" height="4"/>
      <rect x="18" y="44" width="16" height="4"/>
    </g>
    <!-- Belly feather pattern -->
    <g fill="#b8a880" opacity="0.5">
      <rect x="20" y="38" width="2" height="2"/>
      <rect x="28" y="38" width="2" height="2"/>
      <rect x="24" y="42" width="2" height="2"/>
    </g>

    <!-- Head -->
    <g fill="#7a6a4e">
      <rect x="8" y="8" width="36" height="4"/>
      <rect x="4" y="12" width="44" height="4"/>
      <rect x="4" y="16" width="44" height="4"/>
      <rect x="4" y="20" width="44" height="4"/>
      <rect x="8" y="24" width="36" height="4"/>
    </g>

    <!-- Ear tufts -->
    <rect x="8" y="4" width="6" height="6" fill="#7a6a4e"/>
    <rect x="38" y="4" width="6" height="6" fill="#7a6a4e"/>
    <rect x="10" y="2" width="3" height="4" fill="#6b5a3e"/>
    <rect x="40" y="2" width="3" height="4" fill="#6b5a3e"/>

    <!-- Eyes — large, amber, watching -->
    <!-- Left eye socket (dark ring) -->
    <rect x="8" y="14" width="16" height="12" rx="2" fill="#3d3830"/>
    <!-- Right eye socket -->
    <rect x="28" y="14" width="16" height="12" rx="2" fill="#3d3830"/>

    <!-- Left eye iris -->
    <rect x="12" y="16" width="8" height="8" rx="1" fill="#d4a56a"/>
    <!-- Left pupil -->
    <rect x="14" y="18" width="4" height="4" fill="#1e1b16"/>
    <!-- Left eye highlight -->
    <rect x="16" y="17" width="2" height="2" fill="#e8dcc8" opacity="0.8"/>

    <!-- Right eye iris -->
    <rect x="32" y="16" width="8" height="8" rx="1" fill="#d4a56a"/>
    <!-- Right pupil -->
    <rect x="34" y="18" width="4" height="4" fill="#1e1b16"/>
    <!-- Right eye highlight -->
    <rect x="36" y="17" width="2" height="2" fill="#e8dcc8" opacity="0.8"/>

    <!-- Beak -->
    <rect x="22" y="24" width="8" height="4" fill="#8a7a5e"/>
    <rect x="24" y="26" width="4" height="3" fill="#6b5a3e"/>

    <!-- Feet on branch -->
    <rect x="14" y="52" width="4" height="4" fill="#8a7a5e"/>
    <rect x="10" y="54" width="3" height="3" fill="#8a7a5e"/>
    <rect x="18" y="54" width="3" height="3" fill="#8a7a5e"/>
    <rect x="30" y="52" width="4" height="4" fill="#8a7a5e"/>
    <rect x="26" y="54" width="3" height="3" fill="#8a7a5e"/>
    <rect x="34" y="54" width="3" height="3" fill="#8a7a5e"/>

    <!-- Wing fold lines -->
    <rect x="4" y="30" width="2" height="16" fill="#5a4a32" opacity="0.4"/>
    <rect x="46" y="30" width="2" height="16" fill="#5a4a32" opacity="0.4"/>
  </g>

  <!-- Leaves hanging from branch -->
  <g fill="#5e7a3e" opacity="0.5">
    <rect x="8" y="90" width="3" height="4" rx="0.5"/>
    <rect x="116" y="90" width="3" height="4" rx="0.5"/>
    <rect x="6" y="94" width="2" height="3" rx="0.5" opacity="0.3"/>
  </g>

  <!-- Fireflies around owl -->
  <circle cx="16" cy="60" r="1.5" fill="#e8d46e" opacity="0.5" filter="url(#aGlow)">
    <animate attributeName="opacity" values="0.5;0.08;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="112" cy="50" r="1.5" fill="#e8d46e" opacity="0.35" filter="url(#aGlow)">
    <animate attributeName="opacity" values="0.35;0.05;0.35" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Label -->
  <text x="64" y="118" text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="10" font-weight="600" fill="#cdd6f4" opacity="0.7" letter-spacing="1"
  >agent</text>
</svg>

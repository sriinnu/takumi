<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Takumi Logo — V8: Kanji Genesis
    The kanji 匠 being BORN — pixel by pixel, stroke by stroke, like a time-lapse
    of creation itself. The leftmost strokes are solid and complete, the rightmost
    are still forming from floating pixel dust. A pixel brush hovers mid-stroke,
    trailing ink-particles. The background is rice paper with faint grid lines.
    Think Fantasia's paintbrush scene meets The Matrix digital rain meets
    traditional Japanese calligraphy.
  -->
  <defs>
    <linearGradient id="g8paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1c26"/>
      <stop offset="100%" stop-color="#16141e"/>
    </linearGradient>
    <linearGradient id="g8ink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a56a"/>
      <stop offset="60%" stop-color="#f9e2af"/>
      <stop offset="100%" stop-color="#f9e2af"/>
    </linearGradient>
    <linearGradient id="g8brush" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1e"/>
      <stop offset="100%" stop-color="#2a1e14"/>
    </linearGradient>
    <filter id="g8glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g8dust" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Paper/dark surface -->
  <rect width="512" height="512" rx="32" fill="url(#g8paper)"/>

  <!-- Faint grid lines (like graph paper / calligraphy guide) -->
  <g stroke="#313244" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Diagonal guide (calligraphy reference line) -->
  <line x1="100" y1="80" x2="412" y2="360" stroke="#313244" stroke-width="0.5" opacity="0.04"/>

  <!-- ===== THE KANJI BEING BORN — LEFT TO RIGHT PROGRESSION ===== -->
  <g transform="translate(96, 60)">

    <!-- SOLID STROKES (completed, left side of 匚) -->
    <!-- Top horizontal of 匚 — fully drawn, rich ink -->
    <rect x="20" y="40" width="280" height="12" rx="2" fill="#d4a56a" opacity="0.85"/>
    <!-- Left vertical of 匚 — fully drawn -->
    <rect x="20" y="40" width="12" height="240" rx="2" fill="#d4a56a" opacity="0.8"/>
    <!-- Bottom horizontal of 匚 — fully drawn -->
    <rect x="20" y="268" width="280" height="12" rx="2" fill="#d4a56a" opacity="0.75"/>

    <!-- PARTIALLY FORMED STROKES (斤 interior — fading from solid to particles) -->
    <!-- First horizontal of 斤 — mostly solid, slight fade at right end -->
    <rect x="60" y="90" width="180" height="10" rx="2" fill="#d4a56a" opacity="0.7"/>
    <rect x="240" y="90" width="20" height="10" rx="2" fill="#d4a56a" opacity="0.4"/>
    <rect x="260" y="91" width="6" height="8" rx="1" fill="#f9e2af" opacity="0.25"/>

    <!-- Left diagonal stroke — solid top, dissolving bottom -->
    <rect x="80" y="110" width="10" height="16" rx="1" fill="#d4a56a" opacity="0.7"/>
    <rect x="84" y="126" width="10" height="16" rx="1" fill="#d4a56a" opacity="0.6"/>
    <rect x="88" y="142" width="10" height="16" rx="1" fill="#d4a56a" opacity="0.5"/>
    <rect x="92" y="158" width="8" height="12" rx="1" fill="#f9e2af" opacity="0.35"/>
    <rect x="96" y="170" width="6" height="8" rx="1" fill="#f9e2af" opacity="0.2"/>

    <!-- Vertical stroke — starts dissolving midway -->
    <rect x="200" y="90" width="10" height="50" rx="1" fill="#d4a56a" opacity="0.65"/>
    <rect x="200" y="140" width="10" height="20" rx="1" fill="#d4a56a" opacity="0.45"/>
    <rect x="201" y="160" width="8" height="12" rx="1" fill="#f9e2af" opacity="0.3"/>
    <rect x="202" y="172" width="6" height="8" rx="1" fill="#f9e2af" opacity="0.18"/>

    <!-- Center horizontal — half-formed, actively being drawn -->
    <rect x="80" y="176" width="100" height="10" rx="2" fill="#d4a56a" opacity="0.6"/>
    <rect x="180" y="176" width="40" height="10" rx="2" fill="#f9e2af" opacity="0.35"/>
    <!-- Active ink flow at the brush point -->
    <rect x="220" y="177" width="8" height="8" rx="1" fill="#fff5e0" opacity="0.7" filter="url(#g8glow)">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="0.8s" repeatCount="indefinite"/>
    </rect>

    <!-- PIXEL DUST — particles that haven't settled yet (right side) -->
    <!-- These are the strokes that WILL form, currently floating as dust -->
    <g filter="url(#g8dust)">
      <!-- Lower-left descender particles -->
      <rect x="100" y="188" width="4" height="4" fill="#f9e2af" opacity="0.2">
        <animate attributeName="y" values="188;192;188" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="90" y="204" width="3" height="3" fill="#d4a56a" opacity="0.15">
        <animate attributeName="x" values="90;94;90" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="80" y="220" width="4" height="4" fill="#f9e2af" opacity="0.12"/>
      <rect x="70" y="238" width="3" height="3" fill="#d4a56a" opacity="0.1"/>
      <rect x="62" y="252" width="4" height="4" fill="#f9e2af" opacity="0.08"/>

      <!-- Lower-right descender particles -->
      <rect x="220" y="188" width="4" height="4" fill="#f9e2af" opacity="0.18">
        <animate attributeName="y" values="188;194;188" dur="1.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="232" y="206" width="3" height="3" fill="#d4a56a" opacity="0.14">
        <animate attributeName="x" values="232;228;232" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="244" y="222" width="4" height="4" fill="#f9e2af" opacity="0.1"/>
      <rect x="256" y="238" width="3" height="3" fill="#d4a56a" opacity="0.08"/>

      <!-- Ambient floating dust (unassigned pixels, looking for their stroke) -->
      <rect x="270" y="100" width="3" height="3" fill="#f9e2af" opacity="0.1">
        <animate attributeName="y" values="100;96;100" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="x" values="270;274;270" dur="3s" repeatCount="indefinite"/>
      </rect>
      <rect x="250" y="130" width="2" height="2" fill="#d4a56a" opacity="0.12">
        <animate attributeName="y" values="130;126;130" dur="2.7s" repeatCount="indefinite"/>
      </rect>
      <rect x="280" y="160" width="3" height="3" fill="#f9e2af" opacity="0.08">
        <animate attributeName="x" values="280;276;280" dur="3.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="260" y="220" width="2" height="2" fill="#d4a56a" opacity="0.1"/>
      <rect x="290" y="200" width="2" height="2" fill="#f9e2af" opacity="0.07"/>
      <rect x="140" y="240" width="3" height="3" fill="#d4a56a" opacity="0.09">
        <animate attributeName="opacity" values="0.09;0.04;0.09" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ===== THE PIXEL BRUSH ===== -->
  <!-- Hovering at the active ink point, mid-stroke -->
  <g transform="translate(310, 220) rotate(-55)">
    <!-- Brush handle (bamboo pixel art) -->
    <rect x="0" y="-4" width="80" height="8" rx="2" fill="url(#g8brush)"/>
    <rect x="4" y="-2" width="72" height="1" fill="#4a3728" opacity="0.3"/>
    <rect x="4" y="2" width="72" height="1" fill="#1a1410" opacity="0.2"/>
    <!-- Ferrule -->
    <rect x="-4" y="-5" width="8" height="10" rx="1" fill="#585b70"/>
    <!-- Brush tip (loaded with glowing ink) -->
    <rect x="-16" y="-4" width="14" height="8" rx="3" fill="#d4a56a" opacity="0.7"/>
    <rect x="-14" y="-2" width="10" height="4" rx="2" fill="#f9e2af" opacity="0.6"/>
    <!-- Ink drip -->
    <rect x="-12" y="4" width="3" height="6" rx="1" fill="#d4a56a" opacity="0.3">
      <animate attributeName="height" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Ink trail particles from brush -->
  <g fill="#d4a56a" filter="url(#g8dust)">
    <rect x="340" y="200" width="3" height="3" opacity="0.15"/>
    <rect x="356" y="192" width="2" height="2" opacity="0.1"/>
    <rect x="368" y="186" width="2" height="2" opacity="0.07"/>
  </g>

  <!-- ===== TERMINAL PROMPT (grounding it as a coding tool) ===== -->
  <g transform="translate(100, 380)">
    <!-- Subtle terminal container -->
    <rect x="0" y="0" width="312" height="50" rx="4" fill="#0c0a14" opacity="0.4" stroke="#313244" stroke-width="0.5"/>
    <!-- Traffic lights -->
    <circle cx="14" cy="10" r="3" fill="#f38ba8" opacity="0.4"/>
    <circle cx="26" cy="10" r="3" fill="#f9e2af" opacity="0.4"/>
    <circle cx="38" cy="10" r="3" fill="#a6e3a1" opacity="0.4"/>
    <!-- Command line -->
    <rect x="12" y="24" width="8" height="8" rx="1" fill="#a6e3a1" opacity="0.35"/>
    <rect x="26" y="25" width="80" height="6" rx="1" fill="#89b4fa" opacity="0.25"/>
    <rect x="112" y="25" width="48" height="6" rx="1" fill="#cba6f7" opacity="0.2"/>
    <!-- Cursor -->
    <rect x="166" y="24" width="2" height="8" fill="#f9e2af" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <!-- Output line -->
    <rect x="12" y="36" width="120" height="5" rx="1" fill="#6c7086" opacity="0.15"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text
    x="256" y="462"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="28"
    font-weight="600"
    fill="#cdd6f4"
    letter-spacing="10"
    opacity="0.8"
  >TAKUMI</text>

  <rect x="172" y="474" width="168" height="2" rx="1" fill="#d4a56a" opacity="0.2"/>

  <text
    x="256" y="494"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="10"
    fill="#6c7086"
    letter-spacing="4"
    opacity="0.35"
  >pixel by pixel</text>
</svg>
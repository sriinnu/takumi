<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Takumi Logo — V3: Constellation Kanji
    The kanji 匠 formed as a constellation — pixel stars connected by faint lines,
    like the craftsman is written into the cosmos itself. Below: a pixel mountain
    horizon with a coding terminal prompt. The craft is eternal, mapped in stars.
  -->
  <defs>
    <radialGradient id="v3sky" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a1830"/>
      <stop offset="100%" stop-color="#08060e"/>
    </radialGradient>
    <filter id="v3star" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v3line" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="512" height="512" rx="32" fill="url(#v3sky)"/>

  <!-- Background dust / nebula hint -->
  <ellipse cx="200" cy="180" rx="120" ry="80" fill="#cba6f7" opacity="0.015"/>
  <ellipse cx="320" cy="220" rx="100" ry="70" fill="#d4a56a" opacity="0.012"/>

  <!-- Ambient stars (tiny, varied brightness) -->
  <g fill="#cdd6f4">
    <rect x="40" y="24" width="2" height="2" opacity="0.35"/>
    <rect x="112" y="48" width="2" height="2" opacity="0.25"/>
    <rect x="180" y="16" width="2" height="2" opacity="0.4"/>
    <rect x="300" y="30" width="2" height="2" opacity="0.3"/>
    <rect x="400" y="20" width="2" height="2" opacity="0.45"/>
    <rect x="456" y="52" width="2" height="2" opacity="0.25"/>
    <rect x="68" y="100" width="2" height="2" opacity="0.2"/>
    <rect x="448" y="100" width="2" height="2" opacity="0.3"/>
    <rect x="32" y="200" width="2" height="2" opacity="0.2"/>
    <rect x="476" y="180" width="2" height="2" opacity="0.25"/>
    <rect x="52" y="300" width="2" height="2" opacity="0.2"/>
    <rect x="464" y="280" width="2" height="2" opacity="0.15"/>
  </g>

  <!-- ===== CONSTELLATION KANJI 匠 ===== -->
  <!-- Stars as nodes, connected by faint lines. Positioned ~center -->
  <!-- The constellation traces the strokes of 匠 -->
  <g transform="translate(136, 72)">

    <!-- Constellation lines (drawn first, behind stars) -->
    <g stroke="#d4a56a" stroke-width="1" opacity="0.15" filter="url(#v3line)">
      <!-- 匚 outer enclosure -->
      <line x1="20" y1="20" x2="220" y2="20"/>
      <line x1="20" y1="20" x2="20" y2="220"/>
      <line x1="20" y1="220" x2="220" y2="220"/>
      <!-- 斤 top stroke -->
      <line x1="60" y1="60" x2="200" y2="60"/>
      <!-- Left diagonal -->
      <line x1="80" y1="80" x2="100" y2="130"/>
      <!-- Center horizontal -->
      <line x1="80" y1="130" x2="200" y2="130"/>
      <!-- Right vertical -->
      <line x1="170" y1="60" x2="170" y2="130"/>
      <!-- Lower-left curve -->
      <line x1="100" y1="130" x2="60" y2="190"/>
      <!-- Lower-right descender -->
      <line x1="150" y1="130" x2="200" y2="190"/>
    </g>

    <!-- Star nodes — bright pixel dots at stroke intersections -->
    <g filter="url(#v3star)">
      <!-- 匚 corners -->
      <circle cx="20" cy="20" r="4" fill="#f9e2af" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="220" cy="20" r="3.5" fill="#d4a56a" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.35;0.8" dur="3.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="220" r="4" fill="#f9e2af" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.3;0.85" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="220" cy="220" r="3.5" fill="#d4a56a" opacity="0.75"/>
      <!-- 匚 midpoints -->
      <circle cx="120" cy="20" r="2.5" fill="#cba6f7" opacity="0.5"/>
      <circle cx="20" cy="120" r="2.5" fill="#cba6f7" opacity="0.45"/>
      <circle cx="120" cy="220" r="2.5" fill="#cba6f7" opacity="0.5"/>

      <!-- 斤 top stroke -->
      <circle cx="60" cy="60" r="3" fill="#f9e2af" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.25;0.7" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="130" cy="60" r="2" fill="#89b4fa" opacity="0.45"/>
      <circle cx="200" cy="60" r="3" fill="#d4a56a" opacity="0.65"/>

      <!-- Diagonal -->
      <circle cx="80" cy="80" r="2.5" fill="#f5c2e7" opacity="0.55"/>
      <circle cx="90" cy="105" r="2" fill="#f5c2e7" opacity="0.4"/>

      <!-- Center horizontal -->
      <circle cx="80" cy="130" r="3" fill="#f9e2af" opacity="0.7"/>
      <circle cx="130" cy="130" r="2" fill="#89b4fa" opacity="0.4"/>
      <circle cx="200" cy="130" r="3" fill="#d4a56a" opacity="0.65">
        <animate attributeName="opacity" values="0.65;0.2;0.65" dur="3.4s" repeatCount="indefinite"/>
      </circle>

      <!-- Right vertical -->
      <circle cx="170" cy="60" r="2.5" fill="#cba6f7" opacity="0.55"/>
      <circle cx="170" cy="95" r="2" fill="#cba6f7" opacity="0.4"/>
      <circle cx="170" cy="130" r="2.5" fill="#d4a56a" opacity="0.5"/>

      <!-- Lower-left curve (blade) — green tint -->
      <circle cx="100" cy="130" r="2.5" fill="#a6e3a1" opacity="0.5"/>
      <circle cx="80" cy="160" r="2" fill="#a6e3a1" opacity="0.4"/>
      <circle cx="60" cy="190" r="3" fill="#a6e3a1" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4.2s" repeatCount="indefinite"/>
      </circle>

      <!-- Lower-right descender -->
      <circle cx="150" cy="130" r="2" fill="#f5c2e7" opacity="0.4"/>
      <circle cx="175" cy="160" r="2" fill="#f5c2e7" opacity="0.35"/>
      <circle cx="200" cy="190" r="3" fill="#f5c2e7" opacity="0.55"/>
    </g>
  </g>

  <!-- ===== MOUNTAIN HORIZON ===== -->
  <g fill="#12101a">
    <rect x="0" y="360" width="512" height="152"/>
    <!-- Mountain peaks (pixel art) -->
    <rect x="0" y="352" width="8" height="8"/>
    <rect x="8" y="344" width="8" height="16"/>
    <rect x="16" y="336" width="8" height="24"/>
    <rect x="24" y="340" width="8" height="20"/>
    <rect x="32" y="348" width="8" height="12"/>
    <rect x="56" y="348" width="8" height="12"/>
    <rect x="64" y="340" width="8" height="20"/>
    <rect x="72" y="332" width="8" height="28"/>
    <rect x="80" y="324" width="8" height="36"/>
    <rect x="88" y="328" width="8" height="32"/>
    <rect x="96" y="336" width="8" height="24"/>
    <rect x="104" y="344" width="8" height="16"/>
    <rect x="136" y="348" width="8" height="12"/>
    <rect x="144" y="340" width="8" height="20"/>
    <rect x="152" y="348" width="8" height="12"/>
    <rect x="340" y="348" width="8" height="12"/>
    <rect x="348" y="340" width="8" height="20"/>
    <rect x="356" y="332" width="8" height="28"/>
    <rect x="364" y="340" width="8" height="20"/>
    <rect x="388" y="344" width="8" height="16"/>
    <rect x="396" y="336" width="8" height="24"/>
    <rect x="404" y="324" width="8" height="36"/>
    <rect x="412" y="316" width="8" height="44"/>
    <rect x="420" y="324" width="8" height="36"/>
    <rect x="428" y="332" width="8" height="28"/>
    <rect x="436" y="340" width="8" height="20"/>
    <rect x="444" y="348" width="8" height="12"/>
    <rect x="468" y="348" width="8" height="12"/>
    <rect x="476" y="344" width="8" height="16"/>
    <rect x="484" y="340" width="8" height="20"/>
    <rect x="492" y="344" width="8" height="16"/>
    <rect x="500" y="348" width="12" height="12"/>
  </g>

  <!-- Horizon glow line -->
  <rect x="0" y="358" width="512" height="2" fill="#d4a56a" opacity="0.06"/>

  <!-- Terminal prompt on the ground -->
  <g transform="translate(120, 388)">
    <rect x="0" y="0" width="8" height="10" rx="1" fill="#a6e3a1" opacity="0.5"/>
    <!-- Chevron > -->
    <rect x="14" y="1" width="3" height="3" fill="#89b4fa" opacity="0.4"/>
    <rect x="17" y="4" width="3" height="3" fill="#89b4fa" opacity="0.4"/>
    <rect x="14" y="7" width="3" height="3" fill="#89b4fa" opacity="0.4"/>
    <!-- Cursor -->
    <rect x="26" y="0" width="2" height="10" fill="#d4a56a" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <!-- Ghost text -->
    <rect x="34" y="2" width="40" height="6" rx="1" fill="#6c7086" opacity="0.15"/>
    <rect x="80" y="2" width="28" height="6" rx="1" fill="#cba6f7" opacity="0.1"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text
    x="256" y="440"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="30"
    font-weight="600"
    fill="#cdd6f4"
    letter-spacing="10"
    opacity="0.8"
  >TAKUMI</text>

  <rect x="168" y="454" width="176" height="2" rx="1" fill="#d4a56a" opacity="0.2"/>

  <text
    x="256" y="478"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="11"
    fill="#6c7086"
    letter-spacing="4"
    opacity="0.4"
  >written in stars</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Takumi Logo — V10: Aurora Architect
    Northern lights ripple across the sky in pixel bands. Below: a lone pixel
    figure (the architect/craftsman) sits at a terminal desk on a snowy cliff edge,
    silhouetted against the aurora. The terminal screen is the only warm light.
    The kanji 匠 is hidden in the aurora bands — formed by the gaps between
    the light curtains. Pixel pine trees. Snow particles. A scene of solitary
    craft at the edge of the world.
    Think Firewatch meets Celeste meets that one programmer at 3am.
  -->
  <defs>
    <linearGradient id="a10sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c14"/>
      <stop offset="50%" stop-color="#0e1420"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <linearGradient id="a10aurora1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a6e3a1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a6e3a1" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#74c7ec" stop-opacity="0.15"/>
      <stop offset="80%" stop-color="#cba6f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#cba6f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a10aurora2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#74c7ec" stop-opacity="0"/>
      <stop offset="30%" stop-color="#89b4fa" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#a6e3a1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#a6e3a1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a10aurora3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5c2e7" stop-opacity="0"/>
      <stop offset="40%" stop-color="#cba6f7" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#89b4fa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#74c7ec" stop-opacity="0"/>
    </linearGradient>
    <filter id="a10glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="a10aurora" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
    <filter id="a10screenlight" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect width="512" height="512" rx="32" fill="url(#a10sky)"/>

  <!-- Stars -->
  <g fill="#cdd6f4">
    <rect x="40" y="16" width="2" height="2" opacity="0.4"/>
    <rect x="120" y="8" width="2" height="2" opacity="0.3"/>
    <rect x="200" y="20" width="2" height="2" opacity="0.45"/>
    <rect x="310" y="12" width="2" height="2" opacity="0.35"/>
    <rect x="380" y="24" width="2" height="2" opacity="0.4"/>
    <rect x="450" y="16" width="2" height="2" opacity="0.3"/>
    <rect x="70" y="50" width="2" height="2" opacity="0.2"/>
    <rect x="470" y="40" width="2" height="2" opacity="0.25"/>
    <rect x="260" y="6" width="2" height="2" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.1;0.35" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===== AURORA BOREALIS BANDS ===== -->
  <!-- Main bands — sweeping pixel curtains of light -->
  <g filter="url(#a10aurora)">
    <!-- Band 1 (green → cyan → purple) — topmost, widest -->
    <rect x="20" y="40" width="472" height="28" fill="url(#a10aurora1)">
      <animate attributeName="y" values="40;36;44;40" dur="8s" repeatCount="indefinite"/>
    </rect>
    <!-- Band 2 -->
    <rect x="40" y="76" width="440" height="22" fill="url(#a10aurora2)">
      <animate attributeName="y" values="76;80;72;76" dur="7s" repeatCount="indefinite"/>
    </rect>
    <!-- Band 3 (pink → purple → blue) -->
    <rect x="60" y="106" width="400" height="18" fill="url(#a10aurora3)">
      <animate attributeName="y" values="106;102;110;106" dur="9s" repeatCount="indefinite"/>
    </rect>
    <!-- Band 4 -->
    <rect x="80" y="132" width="360" height="14" fill="url(#a10aurora1)" opacity="0.7">
      <animate attributeName="y" values="132;136;128;132" dur="6.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Band 5 (lowest, faintest) -->
    <rect x="100" y="154" width="320" height="10" fill="url(#a10aurora2)" opacity="0.5">
      <animate attributeName="y" values="154;150;158;154" dur="7.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Pixel aurora detail strips (sharp, not blurred — pixel art layer) -->
  <g opacity="0.06">
    <rect x="80" y="44" width="4" height="20" fill="#a6e3a1"/>
    <rect x="92" y="40" width="4" height="26" fill="#74c7ec"/>
    <rect x="108" y="42" width="4" height="22" fill="#a6e3a1"/>
    <rect x="160" y="38" width="4" height="28" fill="#89b4fa"/>
    <rect x="180" y="42" width="4" height="24" fill="#74c7ec"/>
    <rect x="220" y="40" width="4" height="26" fill="#cba6f7"/>
    <rect x="260" y="36" width="4" height="30" fill="#a6e3a1"/>
    <rect x="300" y="42" width="4" height="22" fill="#89b4fa"/>
    <rect x="340" y="38" width="4" height="28" fill="#a6e3a1"/>
    <rect x="380" y="44" width="4" height="20" fill="#cba6f7"/>
    <rect x="420" y="40" width="4" height="24" fill="#74c7ec"/>
  </g>

  <!-- ===== KANJI 匠 IN THE AURORA ===== -->
  <!-- The kanji formed by brighter concentrations in the aurora bands -->
  <text
    x="256" y="140"
    text-anchor="middle"
    font-family="'Noto Serif JP','Hiragino Mincho ProN',serif"
    font-size="100"
    fill="#a6e3a1"
    opacity="0.12"
    filter="url(#a10aurora)"
  >匠</text>
  <text
    x="256" y="140"
    text-anchor="middle"
    font-family="'Noto Serif JP','Hiragino Mincho ProN',serif"
    font-size="100"
    fill="#74c7ec"
    opacity="0.06"
  >匠</text>

  <!-- ===== SNOWY CLIFF / GROUND ===== -->
  <!-- Mountain ridgeline (pixel art) -->
  <g fill="#181e28">
    <rect x="0" y="280" width="512" height="232"/>
    <!-- Ridge detail -->
    <rect x="0" y="272" width="12" height="12"/>
    <rect x="12" y="268" width="12" height="16"/>
    <rect x="24" y="264" width="12" height="20"/>
    <rect x="36" y="268" width="12" height="16"/>
    <rect x="48" y="272" width="12" height="12"/>
    <rect x="80" y="270" width="12" height="14"/>
    <rect x="92" y="264" width="12" height="20"/>
    <rect x="104" y="258" width="12" height="26"/>
    <rect x="116" y="262" width="12" height="22"/>
    <rect x="128" y="268" width="12" height="16"/>
    <rect x="368" y="270" width="12" height="14"/>
    <rect x="380" y="264" width="12" height="20"/>
    <rect x="392" y="256" width="12" height="28"/>
    <rect x="404" y="248" width="12" height="36"/>
    <rect x="416" y="254" width="12" height="30"/>
    <rect x="428" y="262" width="12" height="22"/>
    <rect x="440" y="268" width="12" height="16"/>
    <rect x="464" y="272" width="12" height="12"/>
    <rect x="476" y="268" width="12" height="16"/>
    <rect x="488" y="272" width="24" height="12"/>
  </g>

  <!-- Snow on ridge tops -->
  <g fill="#cdd6f4" opacity="0.1">
    <rect x="24" y="264" width="12" height="3"/>
    <rect x="92" y="264" width="12" height="3"/>
    <rect x="104" y="258" width="12" height="3"/>
    <rect x="392" y="256" width="12" height="3"/>
    <rect x="404" y="248" width="12" height="3"/>
    <rect x="416" y="254" width="12" height="3"/>
  </g>

  <!-- Pixel pine trees (silhouettes on the ridge) -->
  <g fill="#0e1620">
    <!-- Tree 1 -->
    <rect x="150" y="260" width="4" height="20"/>
    <rect x="146" y="252" width="12" height="10"/>
    <rect x="148" y="244" width="8" height="10"/>
    <rect x="150" y="238" width="4" height="8"/>
    <!-- Tree 2 -->
    <rect x="170" y="264" width="4" height="16"/>
    <rect x="166" y="256" width="12" height="10"/>
    <rect x="168" y="250" width="8" height="8"/>
    <rect x="170" y="246" width="4" height="6"/>
    <!-- Tree 3 (distant, smaller) -->
    <rect x="320" y="266" width="4" height="14"/>
    <rect x="316" y="260" width="12" height="8"/>
    <rect x="318" y="254" width="8" height="8"/>
    <rect x="320" y="250" width="4" height="6"/>
    <!-- Tree 4 -->
    <rect x="350" y="268" width="4" height="12"/>
    <rect x="346" y="262" width="12" height="8"/>
    <rect x="348" y="258" width="8" height="6"/>
  </g>

  <!-- ===== THE ARCHITECT — PIXEL FIGURE AT DESK ===== -->
  <g transform="translate(220, 280)">
    <!-- Desk -->
    <rect x="0" y="32" width="72" height="6" rx="1" fill="#3a2a1e"/>
    <rect x="4" y="38" width="4" height="20" fill="#2a1e14"/>
    <rect x="64" y="38" width="4" height="20" fill="#2a1e14"/>

    <!-- Terminal/laptop on desk -->
    <rect x="16" y="12" width="40" height="22" rx="2" fill="#0a1018" stroke="#2a3a4e" stroke-width="1"/>
    <!-- Screen glow (warm, the only warm light in the scene) -->
    <rect x="16" y="12" width="40" height="22" rx="2" fill="#89b4fa" opacity="0.04" filter="url(#a10screenlight)"/>
    <!-- Code on screen -->
    <rect x="20" y="16" width="14" height="3" fill="#cba6f7" opacity="0.6"/>
    <rect x="36" y="16" width="10" height="3" fill="#a6e3a1" opacity="0.5"/>
    <rect x="20" y="22" width="20" height="3" fill="#89b4fa" opacity="0.5"/>
    <rect x="20" y="28" width="8" height="3" fill="#f9e2af" opacity="0.45"/>
    <!-- Cursor blink -->
    <rect x="30" y="28" width="1.5" height="3" fill="#74c7ec" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- The figure (pixel silhouette, sitting) -->
    <!-- Head -->
    <rect x="-12" y="8" width="10" height="10" rx="2" fill="#12181e"/>
    <!-- Body -->
    <rect x="-14" y="18" width="14" height="16" fill="#12181e"/>
    <!-- Arm reaching to keyboard -->
    <rect x="-2" y="26" width="18" height="4" fill="#12181e"/>
    <!-- Chair back hint -->
    <rect x="-18" y="14" width="4" height="24" rx="1" fill="#1a1e28"/>
  </g>

  <!-- Light spill from screen onto figure and desk (very subtle warm glow) -->
  <ellipse cx="256" cy="320" rx="50" ry="20" fill="#89b4fa" opacity="0.015"/>

  <!-- Snow particles falling -->
  <g fill="#cdd6f4">
    <rect x="80" y="200" width="2" height="2" opacity="0.1">
      <animate attributeName="y" values="200;400" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="x" values="80;76" dur="12s" repeatCount="indefinite"/>
    </rect>
    <rect x="180" y="180" width="2" height="2" opacity="0.08">
      <animate attributeName="y" values="180;420" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="x" values="180;184" dur="15s" repeatCount="indefinite"/>
    </rect>
    <rect x="340" y="190" width="2" height="2" opacity="0.1">
      <animate attributeName="y" values="190;430" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="x" values="340;336" dur="14s" repeatCount="indefinite"/>
    </rect>
    <rect x="440" y="170" width="2" height="2" opacity="0.07">
      <animate attributeName="y" values="170;440" dur="16s" repeatCount="indefinite"/>
    </rect>
    <rect x="130" y="220" width="2" height="2" opacity="0.06">
      <animate attributeName="y" values="220;460" dur="13s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text
    x="256" y="410"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="30"
    font-weight="600"
    fill="#cdd6f4"
    letter-spacing="12"
    opacity="0.75"
  >TAKUMI</text>

  <rect x="164" y="422" width="184" height="2" rx="1" fill="#a6e3a1" opacity="0.1"/>

  <text
    x="256" y="444"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="10"
    fill="#6c7086"
    letter-spacing="4"
    opacity="0.3"
  >solitary craft</text>
</svg>
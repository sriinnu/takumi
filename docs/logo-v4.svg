<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Takumi Logo — V4: Torii Terminal
    A pixel-art torii gate reinterpreted as a terminal frame. The gate's crossbeams
    become the title bar, the pillars are the window borders. Inside: code & the kanji.
    Subtle Vedic yantra triangles woven into the gate's structure. You walk through
    the gate into the code.
  -->
  <defs>
    <linearGradient id="v4bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14111c"/>
      <stop offset="100%" stop-color="#0a0810"/>
    </linearGradient>
    <filter id="v4glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="v4softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Deep background -->
  <rect width="512" height="512" rx="32" fill="url(#v4bg)"/>

  <!-- Stars behind everything -->
  <g fill="#cdd6f4">
    <rect x="50" y="30" width="2" height="2" opacity="0.3"/>
    <rect x="140" y="20" width="2" height="2" opacity="0.25"/>
    <rect x="280" y="16" width="2" height="2" opacity="0.35"/>
    <rect x="400" y="28" width="2" height="2" opacity="0.3"/>
    <rect x="460" y="48" width="2" height="2" opacity="0.2"/>
    <rect x="38" y="120" width="2" height="2" opacity="0.2"/>
    <rect x="474" y="90" width="2" height="2" opacity="0.25"/>
    <rect x="32" y="240" width="2" height="2" opacity="0.15"/>
    <rect x="478" y="200" width="2" height="2" opacity="0.2"/>
  </g>

  <!-- ===== TORII GATE / TERMINAL FRAME ===== -->
  <g transform="translate(80, 40)">

    <!-- Kasagi (top crossbeam, curved) — the terminal's title bar -->
    <rect x="0" y="0" width="352" height="8" rx="2" fill="#c94038" opacity="0.85"/>
    <rect x="-8" y="4" width="368" height="4" rx="1" fill="#a62d26" opacity="0.7"/>
    <!-- Traffic lights inside kasagi -->
    <circle cx="20" cy="4" r="4" fill="#f38ba8" opacity="0.8"/>
    <circle cx="36" cy="4" r="4" fill="#f9e2af" opacity="0.8"/>
    <circle cx="52" cy="4" r="4" fill="#a6e3a1" opacity="0.8"/>

    <!-- Shimaki (second crossbeam) -->
    <rect x="24" y="24" width="304" height="6" rx="1" fill="#c94038" opacity="0.6"/>

    <!-- Left pillar (hashira) -->
    <rect x="40" y="30" width="12" height="340" fill="#c94038" opacity="0.45"/>
    <!-- Right pillar -->
    <rect x="300" y="30" width="12" height="340" fill="#c94038" opacity="0.45"/>

    <!-- Subtle yantra triangles woven into the gate structure -->
    <!-- Upward triangle (Shiva) — in the gate's upper space -->
    <polygon points="176,46 126,100 226,100" fill="none" stroke="#d4a56a" stroke-width="1" opacity="0.08"/>
    <!-- Downward triangle (Shakti) — overlapping -->
    <polygon points="176,108 126,54 226,54" fill="none" stroke="#d4a56a" stroke-width="1" opacity="0.06"/>
    <!-- Tiny bindu (center point) -->
    <circle cx="176" cy="78" r="2" fill="#d4a56a" opacity="0.1"/>

    <!-- ===== TERMINAL INTERIOR ===== -->
    <!-- Terminal background (inside the gate) -->
    <rect x="52" y="30" width="248" height="340" fill="#0c0a12" opacity="0.6"/>

    <!-- Code lines (ghost syntax) — the code you walk into -->
    <g opacity="0.18">
      <rect x="68" y="50" width="40" height="6" rx="1" fill="#cba6f7"/>
      <rect x="114" y="50" width="60" height="6" rx="1" fill="#89b4fa"/>
      <rect x="180" y="50" width="20" height="6" rx="1" fill="#a6e3a1"/>

      <rect x="76" y="66" width="32" height="6" rx="1" fill="#f5c2e7"/>
      <rect x="114" y="66" width="80" height="6" rx="1" fill="#6c7086"/>

      <rect x="76" y="82" width="48" height="6" rx="1" fill="#a6e3a1"/>
      <rect x="130" y="82" width="36" height="6" rx="1" fill="#89b4fa"/>
    </g>

    <!-- KANJI 匠 — large, golden, center of the gate -->
    <text
      x="176" y="230"
      text-anchor="middle"
      font-family="'Noto Serif JP','Hiragino Mincho ProN',serif"
      font-size="130"
      fill="#d4a56a"
      opacity="0.85"
      filter="url(#v4glow)"
    >匠</text>

    <!-- Mandala ring around kanji — very subtle -->
    <circle cx="176" cy="200" r="90" fill="none" stroke="#d4a56a" stroke-width="0.5" opacity="0.06"/>
    <g fill="#d4a56a" opacity="0.08">
      <circle cx="176" cy="110" r="2"/>
      <circle cx="176" cy="290" r="2"/>
      <circle cx="86" cy="200" r="2"/>
      <circle cx="266" cy="200" r="2"/>
      <circle cx="112" cy="136" r="1.5"/>
      <circle cx="240" cy="136" r="1.5"/>
      <circle cx="112" cy="264" r="1.5"/>
      <circle cx="240" cy="264" r="1.5"/>
    </g>

    <!-- More code below kanji — you see code above and below -->
    <g opacity="0.12">
      <rect x="68" y="308" width="56" height="6" rx="1" fill="#89b4fa"/>
      <rect x="130" y="308" width="40" height="6" rx="1" fill="#cba6f7"/>

      <rect x="68" y="324" width="32" height="6" rx="1" fill="#a6e3a1"/>
      <rect x="106" y="324" width="72" height="6" rx="1" fill="#6c7086"/>

      <rect x="76" y="340" width="44" height="6" rx="1" fill="#f5c2e7"/>
      <rect x="126" y="340" width="24" height="6" rx="1" fill="#89b4fa"/>
    </g>

    <!-- Blinking cursor at bottom -->
    <rect x="68" y="356" width="2" height="10" fill="#d4a56a" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- Gate foundation stones (ground plane) -->
    <rect x="32" y="370" width="28" height="8" rx="1" fill="#585b70" opacity="0.25"/>
    <rect x="292" y="370" width="28" height="8" rx="1" fill="#585b70" opacity="0.25"/>
  </g>

  <!-- Cherry blossom petals drifting -->
  <g fill="#f5c2e7" opacity="0.2">
    <ellipse cx="60" cy="180" rx="4" ry="2.5" transform="rotate(-25,60,180)">
      <animate attributeName="cy" values="180;400;180" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="60;45;60" dur="18s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="440" cy="140" rx="3.5" ry="2" transform="rotate(30,440,140)">
      <animate attributeName="cy" values="140;380;140" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="440;460;440" dur="22s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="470" cy="260" rx="3" ry="2" transform="rotate(-15,470,260)">
      <animate attributeName="cy" values="260;420;260" dur="15s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text
    x="256" y="452"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="28"
    font-weight="600"
    fill="#cdd6f4"
    letter-spacing="10"
    opacity="0.8"
  >TAKUMI</text>

  <rect x="176" y="464" width="160" height="2" rx="1" fill="#c94038" opacity="0.2"/>

  <text
    x="256" y="486"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="11"
    fill="#6c7086"
    letter-spacing="4"
    opacity="0.4"
  >enter the gate</text>
</svg>

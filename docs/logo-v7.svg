<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Takumi Logo — V7: Floating Isles
    A tiny pixel-art floating island — Miyazaki meets Studio Ghibli meets
    Howl's Moving Castle. The island has a pixel workshop/hut on top, gears
    and pipes underneath, waterfalls pouring off the edges into clouds below.
    The workshop has a glowing terminal window. The kanji hovers above the
    chimney like enchanted smoke. Whimsical, alive, impossible architecture.
  -->
  <defs>
    <linearGradient id="f7sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1830"/>
      <stop offset="40%" stop-color="#1e1b36"/>
      <stop offset="100%" stop-color="#2a1f3e"/>
    </linearGradient>
    <linearGradient id="f7earth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3728"/>
      <stop offset="50%" stop-color="#3a2a1e"/>
      <stop offset="100%" stop-color="#2a1e14"/>
    </linearGradient>
    <linearGradient id="f7water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#74c7ec"/>
    </linearGradient>
    <filter id="f7glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f7cloud">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="f7softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Twilight sky -->
  <rect width="512" height="512" rx="32" fill="url(#f7sky)"/>

  <!-- Stars -->
  <g fill="#cdd6f4">
    <rect x="60" y="20" width="2" height="2" opacity="0.4"/>
    <rect x="140" y="12" width="2" height="2" opacity="0.3"/>
    <rect x="240" y="8" width="2" height="2" opacity="0.45"/>
    <rect x="340" y="16" width="2" height="2" opacity="0.35"/>
    <rect x="420" y="10" width="2" height="2" opacity="0.4"/>
    <rect x="480" y="24" width="2" height="2" opacity="0.25"/>
    <rect x="32" y="60" width="2" height="2" opacity="0.2"/>
    <rect x="480" y="56" width="2" height="2" opacity="0.3"/>
    <rect x="100" y="50" width="2" height="2" opacity="0.25"/>
    <rect x="400" y="44" width="2" height="2" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.1;0.35" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ===== FLOATING ISLAND ===== -->
  <g transform="translate(100, 140)">

    <!-- Island underside — rocky, with stalactites, gears, pipes -->
    <!-- Main rock body -->
    <path d="M60,120 L40,160 L30,200 L50,240 L80,260 L120,272 L180,278 L240,272 L270,260 L290,240 L300,200 L290,160 L270,120" fill="url(#f7earth)" opacity="0.85"/>
    <!-- Stalactite pixel details -->
    <rect x="100" y="272" width="8" height="20" fill="#2a1e14" opacity="0.7"/>
    <rect x="108" y="278" width="8" height="28" fill="#3a2a1e" opacity="0.6"/>
    <rect x="180" y="274" width="8" height="24" fill="#2a1e14" opacity="0.65"/>
    <rect x="220" y="270" width="8" height="16" fill="#3a2a1e" opacity="0.6"/>
    <!-- Gear peaking out (pixel art) -->
    <circle cx="140" cy="200" r="14" fill="none" stroke="#585b70" stroke-width="3" opacity="0.3"/>
    <circle cx="140" cy="200" r="6" fill="#585b70" opacity="0.25"/>
    <rect x="137" y="184" width="6" height="8" fill="#585b70" opacity="0.3"/>
    <rect x="137" y="208" width="6" height="8" fill="#585b70" opacity="0.3"/>
    <rect x="152" y="197" width="8" height="6" fill="#585b70" opacity="0.3"/>
    <rect x="124" y="197" width="8" height="6" fill="#585b70" opacity="0.3"/>
    <!-- Pipe (pixel) -->
    <rect x="200" y="180" width="6" height="60" rx="2" fill="#45475a" opacity="0.35"/>
    <rect x="196" y="220" width="14" height="6" rx="2" fill="#585b70" opacity="0.3"/>

    <!-- Waterfall left — pouring off the island -->
    <rect x="58" y="120" width="6" height="180" rx="2" fill="url(#f7water)" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.12;0.2" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="62" y="140" width="3" height="160" rx="1" fill="#74c7ec" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.08;0.15" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Waterfall right -->
    <rect x="268" y="126" width="5" height="170" rx="2" fill="url(#f7water)" opacity="0.18">
      <animate attributeName="opacity" values="0.18;0.1;0.18" dur="2.2s" repeatCount="indefinite"/>
    </rect>

    <!-- ===== ISLAND TOP SURFACE ===== -->
    <!-- Flat ground -->
    <rect x="50" y="110" width="230" height="14" rx="3" fill="#4a6741" opacity="0.9"/>
    <!-- Grass tufts (pixel) -->
    <rect x="56" y="106" width="4" height="6" fill="#6bab56" opacity="0.7"/>
    <rect x="80" y="104" width="4" height="8" fill="#7bc065" opacity="0.65"/>
    <rect x="250" y="106" width="4" height="6" fill="#6bab56" opacity="0.7"/>
    <rect x="264" y="108" width="4" height="4" fill="#7bc065" opacity="0.6"/>

    <!-- ===== WORKSHOP HUT ===== -->
    <!-- Hut walls (stone/wood pixel art) -->
    <rect x="100" y="50" width="130" height="62" fill="#3a3a4e" stroke="#45475a" stroke-width="1"/>
    <!-- Roof (tiled, pixel) -->
    <polygon points="90,52 165,10 240,52" fill="#7f5539"/>
    <polygon points="94,52 165,14 236,52" fill="#9c6644" opacity="0.6"/>
    <!-- Roof tile lines -->
    <line x1="100" y1="48" x2="230" y2="48" stroke="#6b3f28" stroke-width="1" opacity="0.4"/>
    <line x1="110" y1="40" x2="220" y2="40" stroke="#6b3f28" stroke-width="1" opacity="0.35"/>
    <line x1="120" y1="32" x2="210" y2="32" stroke="#6b3f28" stroke-width="1" opacity="0.3"/>

    <!-- Door -->
    <rect x="150" y="80" width="20" height="32" rx="2" fill="#1a1a2a"/>
    <rect x="166" y="94" width="3" height="3" rx="1" fill="#d4a56a" opacity="0.5"/>

    <!-- TERMINAL WINDOW in the hut wall (glowing!) -->
    <rect x="108" y="60" width="36" height="28" rx="2" fill="#0c0a14" stroke="#89b4fa" stroke-width="1" opacity="0.8"/>
    <!-- Window glow -->
    <rect x="108" y="60" width="36" height="28" rx="2" fill="#89b4fa" opacity="0.05"/>
    <!-- Code inside window (tiny pixel lines) -->
    <rect x="112" y="66" width="12" height="3" fill="#cba6f7" opacity="0.6"/>
    <rect x="126" y="66" width="8" height="3" fill="#a6e3a1" opacity="0.5"/>
    <rect x="112" y="72" width="16" height="3" fill="#89b4fa" opacity="0.5"/>
    <rect x="112" y="78" width="10" height="3" fill="#f9e2af" opacity="0.5"/>
    <rect x="124" y="78" width="14" height="3" fill="#6c7086" opacity="0.4"/>
    <!-- Window light spill -->
    <rect x="110" y="88" width="32" height="4" fill="#89b4fa" opacity="0.03"/>

    <!-- Second window -->
    <rect x="186" y="60" width="36" height="28" rx="2" fill="#0c0a14" stroke="#f9e2af" stroke-width="1" opacity="0.6"/>
    <rect x="190" y="66" width="14" height="3" fill="#f5c2e7" opacity="0.5"/>
    <rect x="190" y="72" width="20" height="3" fill="#89b4fa" opacity="0.4"/>

    <!-- Chimney -->
    <rect x="190" y="4" width="16" height="20" fill="#585b70"/>
    <rect x="188" y="2" width="20" height="4" fill="#6c7086"/>
  </g>

  <!-- ===== KANJI AS ENCHANTED SMOKE FROM CHIMNEY ===== -->
  <text
    x="304" y="100"
    text-anchor="middle"
    font-family="'Noto Serif JP','Hiragino Mincho ProN',serif"
    font-size="72"
    fill="#d4a56a"
    opacity="0.7"
    filter="url(#f7glow)"
  >匠</text>
  <!-- Smoke wisps rising from chimney to kanji -->
  <g fill="#585b70" opacity="0.08" filter="url(#f7cloud)">
    <ellipse cx="306" cy="148" rx="8" ry="4"/>
    <ellipse cx="300" cy="132" rx="6" ry="3"/>
    <ellipse cx="308" cy="118" rx="5" ry="3"/>
  </g>

  <!-- ===== CLOUDS BELOW ===== -->
  <g filter="url(#f7cloud)">
    <ellipse cx="120" cy="430" rx="80" ry="20" fill="#cdd6f4" opacity="0.04"/>
    <ellipse cx="300" cy="420" rx="100" ry="24" fill="#cdd6f4" opacity="0.035"/>
    <ellipse cx="450" cy="440" rx="60" ry="16" fill="#cdd6f4" opacity="0.025"/>
    <ellipse cx="60" cy="450" rx="50" ry="14" fill="#cdd6f4" opacity="0.03"/>
    <ellipse cx="200" cy="460" rx="90" ry="18" fill="#cdd6f4" opacity="0.025"/>
  </g>
  <!-- Pixel cloud tops (visible, not blurred) -->
  <g fill="#cdd6f4" opacity="0.06">
    <rect x="80" y="424" width="8" height="4"/>
    <rect x="92" y="420" width="8" height="8"/>
    <rect x="104" y="422" width="8" height="6"/>
    <rect x="116" y="418" width="8" height="8"/>
    <rect x="128" y="422" width="8" height="6"/>
    <rect x="260" y="412" width="8" height="6"/>
    <rect x="272" y="408" width="8" height="10"/>
    <rect x="284" y="410" width="8" height="8"/>
    <rect x="296" y="406" width="8" height="10"/>
    <rect x="308" y="412" width="8" height="6"/>
    <rect x="320" y="414" width="8" height="4"/>
  </g>

  <!-- Birds (tiny pixel Vs in distance) -->
  <g stroke="#cdd6f4" stroke-width="1.5" fill="none" opacity="0.12">
    <polyline points="52,100 56,96 60,100"/>
    <polyline points="68,108 72,104 76,108"/>
    <polyline points="440,88 444,84 448,88"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text
    x="256" y="466"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="28"
    font-weight="600"
    fill="#cdd6f4"
    letter-spacing="10"
    opacity="0.8"
  >TAKUMI</text>

  <rect x="172" y="476" width="168" height="2" rx="1" fill="#89b4fa" opacity="0.15"/>

  <text
    x="256" y="496"
    text-anchor="middle"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="10"
    fill="#6c7086"
    letter-spacing="4"
    opacity="0.35"
  >sky workshop</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 
    Takumi Logo - Final A
    Concept: Craftsman's hammer meets terminal cursor
    Clean 64x64 grid, pixel-perfect alignment
  -->
  <defs>
    <linearGradient id="hammerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  
  <!-- Background: Deep terminal black -->
  <rect width="64" height="64" fill="#0D1117"/>
  
  <!-- Hammer head (horizontal) -->
  <rect x="16" y="18" width="32" height="12" rx="2" fill="url(#hammerGrad)"/>
  
  <!-- Hammer handle (vertical) -->
  <rect x="28" y="30" width="8" height="24" rx="1" fill="#8B5CF6"/>
  
  <!-- Terminal cursor blink at handle base -->
  <rect x="28" y="54" width="8" height="4" fill="#22C55E">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Subtle spark/craft indicator -->
  <circle cx="14" cy="14" r="2" fill="#FBBF24"/>
  <circle cx="50" cy="14" r="1.5" fill="#FBBF24" opacity="0.7"/>
</svg>

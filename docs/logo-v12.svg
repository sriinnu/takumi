<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <rect width="100" height="100" fill="#1A1C29" />
  
  <!-- Sleek neon gradients -->
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FC466B" />
      <stop offset="100%" stop-color="#3F5EFB" />
    </linearGradient>
  </defs>

  <!-- Cyberpunk Anvil / Floppy Disk hybrid -->
  <g fill="url(#neonGlow)">
    <rect x="20" y="30" width="60" height="20" rx="3" />
    <rect x="30" y="50" width="40" height="30" rx="0" />
    <path d="M 40 50 L 60 50 L 50 80 Z" opacity="0.8" />
  </g>

  <!-- Glowing sparks -->
  <circle cx="25" cy="20" r="3" fill="#FFFFFF">
    <animate attributeName="cy" values="20;5" dur="0.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="75" cy="25" r="2" fill="#FFFFFF">
    <animate attributeName="cy" values="25;10" dur="1.2s" repeatCount="indefinite" />
  </circle>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" width="220" height="64">
  <!--
    Takumi badge — Vedic × Japanese fusion compact badge.
    Miniature fire altar with kanji, lotus accent, yantra hint.
  -->
  <defs>
    <radialGradient id="bFire" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#f9e2af" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0c0a12" stop-opacity="0"/>
    </radialGradient>
    <filter id="bGlow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background — cosmic dark -->
  <rect width="220" height="64" rx="12" fill="#0c0a12"/>
  <rect x="0.5" y="0.5" width="219" height="63" rx="11.5" fill="none" stroke="#2a2436" stroke-width="1"/>

  <!-- Left section: fire altar with kanji -->
  <rect x="6" y="6" width="52" height="52" rx="8" fill="#16121e"/>
  <!-- Mini fire glow -->
  <rect x="6" y="6" width="52" height="52" rx="8" fill="url(#bFire)"/>

  <!-- Tiny yantra triangles -->
  <polygon points="32,12 42,38 22,38" fill="none" stroke="#d4a56a" stroke-width="0.5" opacity="0.15"/>
  <polygon points="32,42 22,16 42,16" fill="none" stroke="#cba6f7" stroke-width="0.5" opacity="0.1"/>

  <!-- Mini flames -->
  <rect x="28" y="36" width="3" height="6" rx="1" fill="#e08030" opacity="0.4"/>
  <rect x="32" y="34" width="3" height="8" rx="1" fill="#e8a040" opacity="0.5"/>
  <rect x="36" y="36" width="3" height="6" rx="1" fill="#e08030" opacity="0.4"/>
  <rect x="30" y="32" width="4" height="4" rx="1" fill="#f9e2af" opacity="0.3"/>

  <!-- Kanji — golden, glowing -->
  <text
    x="32" y="28"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Noto Sans JP','Hiragino Kaku Gothic Pro',sans-serif"
    font-size="24"
    font-weight="700"
    fill="#f9e2af"
    filter="url(#bGlow2)"
    opacity="0.9"
  >匠</text>

  <!-- Tiny lotus under altar -->
  <ellipse cx="32" cy="50" rx="3" ry="2" fill="#c07898" opacity="0.3"/>
  <circle cx="32" cy="49" r="1" fill="#d4a56a" opacity="0.3"/>

  <!-- Divider — subtle with spark -->
  <line x1="66" y1="14" x2="66" y2="50" stroke="#2a2436" stroke-width="1"/>
  <circle cx="66" cy="12" r="1.5" fill="#f9e2af" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.08;0.35" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- "takumi" text -->
  <text
    x="78" y="28"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="18"
    font-weight="600"
    fill="#cdd6f4"
    letter-spacing="2"
  >takumi</text>

  <!-- Subtitle — karma/craft -->
  <text
    x="78" y="46"
    font-family="'SF Mono','Fira Code','JetBrains Mono',monospace"
    font-size="9"
    fill="#8a7a6a"
    letter-spacing="1"
    opacity="0.6"
  >कर्म · craft</text>

  <!-- Mandala dots (top-right corner accent) -->
  <circle cx="196" cy="12" r="1.5" fill="#cba6f7" opacity="0.2"/>
  <circle cx="204" cy="16" r="1" fill="#d4a56a" opacity="0.15"/>
  <circle cx="200" cy="8" r="1" fill="#89b4fa" opacity="0.12"/>
</svg>
